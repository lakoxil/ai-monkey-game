<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 猴子遊戲 / 踩地雷</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="header-row">
          <div>
            <p class="eyebrow">第六堂課 · Action → Feedback → Learning</p>
            <h1 id="game-title">AI 猴子遊戲 / 踩地雷</h1>
          </div>
          <button class="secondary-button" id="resetButton" type="button">重新開始</button>
        </div>

        <div class="mode-card" aria-label="模式選擇">
          <div class="mode-tabs" id="modeTabs"></div>
          <p class="mode-description" id="modeDescription"></p>
        </div>

        <div class="status-grid">
          <div class="status-item">
            <span>目前數字範圍</span>
            <strong>1–100</strong>
          </div>
          <div class="status-item">
            <span>目前回合</span>
            <strong id="roundCount">0</strong>
          </div>
          <div class="status-item success" id="successStatus" hidden>
            <span>狀態</span>
            <strong>猜中了</strong>
          </div>
        </div>

        <form class="guess-form" id="guessForm">
          <label for="guessInput">輸入 1–100 的整數</label>
          <div class="guess-controls">
            <input
              id="guessInput"
              name="guess"
              type="number"
              inputmode="numeric"
              min="1"
              max="100"
              placeholder="例如 50"
              autocomplete="off"
              required
            />
            <button class="primary-button" id="guessButton" type="submit">猜測</button>
          </div>
          <p class="input-help" id="inputHelp" role="alert"></p>
        </form>

        <section class="feedback-box" aria-live="polite" aria-label="系統回饋">
          <div class="feedback-title">系統回饋</div>
          <p id="streamingFeedback"></p>
        </section>

        <details class="teacher-panel">
          <summary>教師模式</summary>
          <div class="teacher-grid">
            <div>
              <span>答案</span>
              <strong id="teacherAnswer"></strong>
            </div>
            <div>
              <span>Mode 3 隱藏規則</span>
              <strong>每 5 格扣 5 分，加上接近/遠離微調</strong>
            </div>
          </div>
          <div class="teacher-actions">
            <button class="secondary-button" id="exportJsonButton" type="button">匯出 JSON</button>
            <button class="secondary-button" id="exportCsvButton" type="button">匯出 CSV</button>
          </div>
        </details>

        <section class="history-section" aria-labelledby="history-title">
          <div class="section-row">
            <h2 id="history-title">歷史紀錄</h2>
            <span id="historyHint">每一次回饋都會成為下一次策略的線索。</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Round</th>
                  <th>Guess</th>
                  <th>Feedback</th>
                  <th>Score</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app/main.js"></script>
  </body>
</html>
